<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Odin sign Up</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="container">
                <div class="bg">
                    <div class="logo">
                        <img src="img/odin logo.png" alt="#">
                        <p>Odin</p>
                    </div>
                    <div class="img-copyrights">
                        <span>photo by <a href="#">Haile west</a> on <a
                                href="#">unsplash</a></span>
                    </div>
                </div>
                <div class="content">
                    <div class="text">
                        <p>This is not a real online service! You know you need
                            something
                            like this in your life to help you realize your
                            deepest dreams.
                            Sign up now to get started.</p>

                        <p>You know you want to.</p>
                    </div>

                    <form action>
                        <p>Let's do this!</p>

                        <div>
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name">
                        </div>
                        <div>
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name">
                        </div>

                        <div>
                            <label for="phone-number">Phone Number</label>
                            <input type="tel" id="phone-number">
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" id="email">
                        </div>

                        <div>
                            <label for="password">Password</label>
                            <input type="password" id="password">
                        </div>
                        <div>
                            <label for="confirm-password">Confirm
                                Password</label>
                            <input type="password" id="confirm-password">
                        </div>
                    </form>

                    <button type="submit">Create Account</button>

                    <p class="sign-in">Already have an acount?<a href="#"> Login</a></p>
                </div>
            </div>
        </div>

    </body>
</html>
