<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form with icon</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <div class="name">Login Form</div>
        </div>
        <div class="websites">
            <button class="face"><i class="fa-brands fa-facebook-f"></i>Facebook</button>
            <button class="x"><i class="fa-brands fa-x-twitter"></i></i></span>
        </div>
        <form>
        <div class="form"> <!--form action ="#"-->
            <div class="box">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Email or Phone">
            </div>
            <div class="box">
                <i class="fa-solid fa-lock"></i>
                <input type="text" placeholder="Password">
            </div>
        </div>
        <div class="text">
            <span class="checkbox"><input type="checkbox">Remember me</span>
            <a href="#" class="forget">Forgot Password?</a>
        </div>
        <div class="login">
            <input type="submit" value="Login">
        </div>
        <div class="membership">
            <span class="member">Not a member?</span>
            <a href="#">Sign up now</a>
        </div>
        </form>
    </div>
</body>
</html>
