<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Side Navigation Bar</title>
        <link rel="stylesheet" href="CSS/style.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <div class="wrapper">
            <input type="checkbox" id="btn">
            <label for="" class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </label>
            <nav id="sidebar">
                <div class="title">Side Menu</div>
                <ul class="list-items">
                    <li><a href="#"><i class="fa-solid fa-house"></i>Home</a></li>
                    <li><a href="#"><i class="fa-solid fa-sliders"></i>Clients</a></li>
                    <li><a href="#"><i class="fa-solid fa-address-book"></i>Services</a></li>
                    <li><a href="#"><i class="fa-solid fa-gear"></i>Settings</a></li>
                    <li><a href="#"><i class="fa-solid fa-bars-staggered"></i>Features</a></li>
                    <li><a href="#"><i class="fa-solid fa-user"></i>About Us</a></li>
                    <li><a href="#"><i class="fa-solid fa-earth-asia"></i>Languages</a></li>
                    <li><a href="#"><i class="fa-solid fa-envelope"></i>Contact Us</a></li>
                    <div class="icons">
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                </ul>
            </nav>
        </div>
    </body>
</html>
